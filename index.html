<!DOCTYPE html>
<html>
<head>
    <title>Payment Status - Inner Shift Nirvaana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .success-box {
            background: #d4edda;
            border: 2px solid #28a745;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
        }
        .whatsapp-btn {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0;
            transition: all 0.3s;
        }
        .whatsapp-btn:hover {
            background: #128C7E;
            transform: translateY(-2px);
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e2f !important;  /* Dark background */
            color: #00ff00 !important;        /* Bright green text */
            border: 2px solid #00ff00;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            text-align: left;
            display: block !important;        /* Force display */
            opacity: 1 !important;             /* Force visibility */
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Processing State -->
        <div id="processing">
            <div class="spinner"></div>
            <h2>Verifying Your Payment</h2>
            <p>Please wait while we confirm your transaction...</p>
        </div>

        <!-- Success State - WhatsApp Link -->
        <div id="success" class="hidden">
            <div class="success-box">
                <div style="font-size: 60px;">✅</div>
                <h2 style="color: #155724;">Payment Successful!</h2>
                <p style="color: #155724;">Thank you for your purchase.</p>
                <!-- ADD THIS LINE to show payment ID -->
                <p style="color: #155724; font-size: 14px; margin: 10px 0; word-break: break-all;">
                    <strong>Payment ID:</strong> <span id="payment-id-display">Loading...</span>
                </p>                
                <a href="https://chat.whatsapp.com/DUQhY3dPOlUCl15Xv01qpy?mode=gi_t" 
                   class="whatsapp-btn" target="_blank">
                    📱 Join WhatsApp Group
                </a>
            </div>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden">
            <div style="font-size: 60px;">❌</div>
            <h2 style="color: #dc3545;">Payment Verification Failed</h2>
            <p id="error-message">Please complete your payment first.</p>
        </div>

        <!-- Debug Info -->
        <div class="debug-info" id="debug">
            <strong>Debug Info:</strong><br>
            <span id="debug-content"></span>
        </div>
    </div>

    <script>
        (function() {
            // Get referrer and URL info
            const referrer = document.referrer || 'none';
            const currentUrl = window.location.href;
            const urlParams = new URLSearchParams(window.location.search);
            const paymentId = urlParams.get('razorpay_payment_id') || urlParams.get('pid') || 'none';
            // Check if we have Payment Link ID in sessionStorage
            const paymentLinkId = sessionStorage.getItem('razorpay_payment_link_id');

            // Check computed styles
            const debug = document.getElementById('debug');
            const styles = window.getComputedStyle(debug);
            debug.style.background = '#000';
            debug.style.color = '#0f0';
            debug.style.padding = '20px';
            debug.style.border = '3px solid #0f0';
            debug.style.margin = '20px 0';
            debug.style.display = 'block';
            debug.style.fontSize = '14px';
            debug.style.fontFamily = 'monospace';
            
            console.log('Display:', styles.display);
            console.log('Visibility:', styles.visibility);
            console.log('Opacity:', styles.opacity);
            console.log('Color:', styles.color);
            console.log('Background:', styles.backgroundColor);
        
            // Check if user came from Razorpay
            const isFromRazorpay = referrer.includes('razorpay.com') || 
                                   referrer.includes('pages.razorpay.com') ||
                                   referrer.includes('checkout.razorpay.com') ||
                                   referrer.includes('api.razorpay.com');
            
            console.log('referrer:', referrer);
            console.log('From Razorpay:', isFromRazorpay);
            
            // Display debug info
            const debugContent = document.getElementById('debug-content');
            if (debugContent) {
                debugContent.innerHTML = `
                    Referrer: ${referrer}<br>
                    From Razorpay: ${isFromRazorpay}<br>
                    Payment ID in URL: ${paymentId}<br>
                    URL: ${currentUrl.substring(0, 50)}...
                `;
            }
            
            console.log('🔍 Payment Status Page');
            console.log('Referrer:', referrer);
            console.log('From Razorpay:', isFromRazorpay);
            console.log('Payment ID:', paymentId);
            
            // --- HELPER FUNCTIONS ---
            function fetchPaymentFromPaymentPageId(){
        

                // Check if we have Payment Page ID in sessionStorage
                // (This would need to be stored on the payment page - see below)
                const paymentPageId = sessionStorage.getItem('razorpay_payment_page_id');
                
                if (paymentPageId) {
                    console.log('🔍 Found Payment Page ID:', paymentPageId);
                    
                    fetch(`https://render-payment-webhook-production-c909.up.railway.app/api/payment-by-page/${paymentPageId}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                document.getElementById('payment-id-display').textContent = data.paymentId;
                                document.getElementById('success').style.display = 'block';
                                document.getElementById('processing').style.display = 'none';
                            }
                        });
                }
        
            }
            
            function fetchPaymentFromUserAgent() {
                console.log('🔍 Looking up payment by browser fingerprint...');
                console.log('User Agent string', navigator.userAgent);
                
                fetch('https://render-payment-webhook-production-c909.up.railway.app/api/find-payment-by-ua', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userAgent: navigator.userAgent
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.paymentId) {
                        // Found it! Show success
                        document.getElementById('payment-id-display').textContent = data.paymentId;
                        document.getElementById('success').style.display = 'block';
                        document.getElementById('processing').style.display = 'none';
                        console.log('✅ Found payment by User-Agent:', data.paymentId);
                    } else {
                        console.log('⏳ No payment found yet, retrying...');
                        // Try again in 2 seconds WITHOUT reloading
                        //setTimeout(fetchPaymentFromUserAgent, 2000);
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('processing').style.display = 'none';
                });
            }
            
            function fetchRecentPayment() {
                fetch('https://render-payment-webhook-production-c909.up.railway.app/api/recent-payments')
                    .then(res => res.json())
                    .then(data => {
                        console.log('📋 Recent payments from webhook:', data);
                        
                        if (data.payments && data.payments.length > 0) {
                            const latestPayment = data.payments[0];
                            console.log('💰 Latest payment ID:', latestPayment.paymentId);
                            console.log('📅 Payment time:', latestPayment.timestamp);
                            console.log('💵 Amount:', latestPayment.amount);
                            
                            sessionStorage.setItem('latest_payment_id', latestPayment.paymentId);
                            sessionStorage.setItem('latest_payment_amount', latestPayment.amount);
                            
                            const paymentIdDisplay = document.getElementById('payment-id-display');
                            if (paymentIdDisplay) {
                                paymentIdDisplay.textContent = latestPayment.paymentId;
                            }
                            
                            document.getElementById('success').style.display = 'block';
                        } else {
                            console.log('⚠️ No payments found in webhook');
                        }
                    })
                    .catch(err => console.log('Failed to fetch recent payments:', err));
            }
            
            // --- MAIN LOGIC ---
            
            // After 1.5 seconds, hide processing and decide what to show
            setTimeout(() => {
                document.getElementById('processing').style.display = 'none';
                
                // Priority 1: We have payment ID in URL
                if (paymentId !== 'none') {
                    document.getElementById('success').classList.remove('hidden');
                    document.getElementById('payment-id-display').textContent = paymentId;
                    console.log('✅ WhatsApp link shown - valid payment from URL');
                }
                // Priority 2: Came from Razorpay
                else if (isFromRazorpay) {
                    document.getElementById('success').style.display = 'block';
                    
                    // Try all methods to get payment ID
                    //fetchPaymentFromUserAgent();
                    fetchPaymentFromPaymentPageId();
                    fetchRecentPayment();
                    
                    console.log('✅ WhatsApp link shown - valid payment from referrer');
                }
                // No payment detected
                else {
                    document.getElementById('error').classList.remove('hidden');
                    console.log('❌ No WhatsApp link - direct access');
                }
                
                // Store in sessionStorage
                try {
                    sessionStorage.setItem('payment_verified', 'true');
                    sessionStorage.setItem('payment_time', new Date().toISOString());
                    sessionStorage.setItem('payment_referrer', referrer);
                } catch(e) {}
                
            }, 1500);
        })();
        </script>
</body>
</html>
